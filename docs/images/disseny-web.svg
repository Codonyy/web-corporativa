<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="serviceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#e0e7ff"/>
  
  <!-- Palette icon -->
  <g>
    <!-- Palette shape -->
    <ellipse cx="100" cy="110" rx="45" ry="50" fill="url(#serviceGradient)"/>
    
    <!-- Color dots -->
    <circle cx="75" cy="75" r="8" fill="#fbbf24"/>
    <circle cx="125" cy="75" r="8" fill="#f87171"/>
    <circle cx="100" cy="90" r="8" fill="#34d399"/>
    <circle cx="85" cy="120" r="8" fill="#60a5fa"/>
    <circle cx="115" cy="120" r="8" fill="#a78bfa"/>
    
    <!-- Brush stroke -->
    <path d="M 130 60 Q 145 50 150 40" stroke="#2563eb" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="8" fill="#2563eb" opacity="0.3"/>
  <circle cx="170" cy="170" r="12" fill="#4f46e5" opacity="0.2"/>
</svg>
