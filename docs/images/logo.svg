<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="truckGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a8e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e5ba8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="handGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7ba7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Truck body -->
  <g id="truck">
    <!-- Cabin -->
    <rect x="40" y="60" width="50" height="50" fill="url(#truckGradient)" rx="6"/>
    <rect x="50" y="70" width="30" height="25" fill="#e8f0f7" rx="2"/>
    
    <!-- Door -->
    <rect x="40" y="70" width="8" height="40" fill="#0c4a8e"/>
    
    <!-- Cargo bed -->
    <rect x="90" y="65" width="100" height="45" fill="url(#truckGradient)" rx="3"/>
    <rect x="85" y="110" width="110" height="6" fill="#0c4a8e"/>
    
    <!-- Wheels -->
    <circle cx="65" cy="120" r="12" fill="#1f2937"/>
    <circle cx="65" cy="120" r="8" fill="#4b5563" opacity="0.6"/>
    
    <circle cx="165" cy="120" r="12" fill="#1f2937"/>
    <circle cx="165" cy="120" r="8" fill="#4b5563" opacity="0.6"/>
    
    <!-- Axle -->
    <line x1="65" y1="120" x2="165" y2="120" stroke="#1f2937" stroke-width="3"/>
  </g>
  
  <!-- Hand holding fruit -->
  <g id="hand">
    <!-- Arm -->
    <path d="M 150 80 Q 190 50 230 60" stroke="url(#handGradient)" stroke-width="14" fill="none" stroke-linecap="round"/>
    
    <!-- Palm -->
    <ellipse cx="245" cy="65" rx="18" ry="22" fill="url(#handGradient)"/>
    
    <!-- Fingers -->
    <ellipse cx="235" cy="50" rx="6" ry="12" fill="url(#handGradient)" transform="rotate(-30 235 50)"/>
    <ellipse cx="260" cy="48" rx="6" ry="12" fill="url(#handGradient)" transform="rotate(30 260 48)"/>
  </g>
  
  <!-- Fruit in hand -->
  <g id="fruit">
    <!-- Apple -->
    <circle cx="255" cy="60" r="15" fill="#22c55e"/>
    
    <!-- Leaf -->
    <ellipse cx="268" cy="50" rx="10" ry="14" fill="#16a34a" transform="rotate(-25 268 50)"/>
    
    <!-- Grapes cluster -->
    <circle cx="272" cy="75" r="3" fill="#22c55e"/>
    <circle cx="278" cy="76" r="3" fill="#22c55e"/>
    <circle cx="275" cy="82" r="3" fill="#22c55e"/>
    <circle cx="268" cy="80" r="3" fill="#22c55e"/>
    
    <!-- Leaf for grapes -->
    <ellipse cx="290" cy="70" rx="11" ry="16" fill="#16a34a" transform="rotate(35 290 70)"/>
  </g>
  
  <!-- Circular background for fruits (green circle) -->
  <circle cx="265" cy="65" r="45" fill="none" stroke="#22c55e" stroke-width="2.5" opacity="0.5"/>
  
  <!-- Text -->
  <text x="320" y="95" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#0c4a8e">FoodLogistic</text>
  <text x="440" y="108" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#0c4a8e">S.A.</text>
</svg>
